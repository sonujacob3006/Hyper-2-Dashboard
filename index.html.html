<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Area Ops">
<meta name="theme-color" content="#0d3d1a">
<title>Al Meera · Area Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0d3d1a;--gm:#1b6b30;--gl:#2e9e4f;--gp:#e8f5ec;
  --gold:#c9a23a;--goldl:#f0d078;--goldp:#fdf6e3;
  --w:#fff;--ow:#f8faf8;
  --td:#1a2e1d;--tm:#3d5c42;--tl:#7a9e82;
  --br:#d4e6d8;--rs:#fff0f0;--rt:#c0392b;
  --r:16px;--rs2:10px;--sh:0 2px 12px rgba(13,61,26,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--ow);color:var(--td);min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--gd) 0%,#174d24 60%,#0a2e12 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hdr-in{padding:13px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.hlogo{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--goldl));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.htxt{margin-left:10px}
.htxt h1{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.htxt p{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;font-weight:300}
.hbadge{background:rgba(201,162,58,.2);border:1px solid rgba(201,162,58,.4);color:var(--goldl);font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.goldbar{height:3px;background:linear-gradient(90deg,var(--gold),var(--goldl),var(--gold))}

/* MONTH SELECTOR */
.month-bar{background:var(--gd);padding:8px 14px 10px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.mbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.mbtn.active{background:linear-gradient(135deg,var(--gold),var(--goldl));color:var(--gd);border-color:transparent;font-weight:700}
.mbtn.ytd{background:rgba(46,158,79,.25);border-color:rgba(46,158,79,.4);color:#7effa0}
.mbtn.ytd.active{background:linear-gradient(135deg,var(--gl),var(--gm));color:#fff;border-color:transparent}

/* NAV TABS */
.navtabs{display:flex;background:#0a2e12;padding:0 14px 10px;gap:6px;overflow-x:auto;scrollbar-width:none}
.navtabs::-webkit-scrollbar{display:none}
.navtab{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.navtab.active{background:rgba(201,162,58,.3);color:var(--goldl);border-color:rgba(201,162,58,.4);font-weight:600}

/* VIEWS */
.view{display:none;padding:12px 12px 24px}
.view.active{display:block}
#view-store{padding:0}#view-areadetail{padding:0}

/* MONTH LABEL PILL */
.mlabel{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--gold),var(--goldl));color:var(--gd);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* KPI STRIP */
.kstrip{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.kcard{background:#fff;border-radius:var(--rs2);padding:11px 12px 9px;box-shadow:var(--sh);border-left:3px solid var(--gold)}
.kcard.wide{grid-column:span 2;border-left-color:var(--gm);display:flex;align-items:center;gap:12px}
.kcard.wide .kico{font-size:24px;flex-shrink:0}
.kcard.wide .kval{font-size:19px}
.klbl{font-size:9px;color:var(--tl);font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.kval{font-size:16px;font-weight:700;color:var(--gd);font-family:'Playfair Display',serif;line-height:1.1}
.ksub{font-size:9px;color:var(--tl);margin-top:2px}

/* AREA DETAIL BUTTON */
.adbtn{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--gold),var(--goldl));border-radius:var(--rs2);padding:12px 15px;margin-bottom:12px;cursor:pointer;box-shadow:0 3px 14px rgba(201,162,58,.3);border:none;width:100%;font-family:'DM Sans',sans-serif}
.adbtn-l{display:flex;align-items:center;gap:9px}
.adbtn-ico{font-size:20px}
.adbtn-t{font-size:12px;font-weight:700;color:var(--gd);font-family:'Playfair Display',serif;text-align:left}
.adbtn-s{font-size:9px;color:rgba(13,61,26,.65);margin-top:1px;text-align:left}
.adbtn-arr{font-size:18px;color:var(--gd);opacity:.6}

/* SECTION TITLE */
.stitle{font-size:10px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stitle::after{content:'';flex:1;height:1px;background:var(--br)}

/* STORE CARDS */
.slist{display:flex;flex-direction:column;gap:8px}
.scard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;cursor:pointer;border:1px solid var(--br);animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scard:nth-child(1){animation-delay:.03s}.scard:nth-child(2){animation-delay:.06s}.scard:nth-child(3){animation-delay:.09s}
.scard:nth-child(4){animation-delay:.12s}.scard:nth-child(5){animation-delay:.15s}.scard:nth-child(6){animation-delay:.18s}
.scard:nth-child(7){animation-delay:.21s}.scard:nth-child(8){animation-delay:.24s}.scard:nth-child(9){animation-delay:.27s}
.scard:nth-child(10){animation-delay:.30s}
.schdr{background:linear-gradient(135deg,var(--gd),var(--gm));padding:9px 12px 7px;display:flex;align-items:center;justify-content:space-between}
.scname{color:#fff;font-weight:600;font-size:13px;font-family:'Playfair Display',serif}
.scsub{color:rgba(255,255,255,.5);font-size:9px;margin-top:1px}
.scrank{background:rgba(201,162,58,.25);color:var(--goldl);font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;border:1px solid rgba(201,162,58,.3);font-family:'Playfair Display',serif}
.scbody{padding:9px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.scm{text-align:center}
.scmv{font-size:11px;font-weight:700;color:var(--gd);line-height:1.2}
.scml{font-size:8px;color:var(--tl);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.scft{padding:5px 12px 7px;border-top:1px solid var(--br);display:flex;align-items:center;gap:6px}
.vbadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;white-space:nowrap}
.vbadge.pos{background:#e6f9ed;color:#1b7a3a}
.vbadge.neg{background:var(--rs);color:var(--rt)}
.awrap{flex:1}
.albl{font-size:8px;color:var(--tl);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.abar{height:4px;background:var(--br);border-radius:2px;overflow:hidden}
.afill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gm),var(--gl))}
.thint{font-size:8px;color:var(--tl);white-space:nowrap}

/* STORE DETAIL HEADER */
.sdh{background:linear-gradient(135deg,var(--gd) 0%,#1a5e2a 100%);padding:12px 14px 16px;position:relative;overflow:hidden}
.sdh::before{content:'';position:absolute;top:-25px;right:-25px;width:100px;height:100px;background:radial-gradient(circle,rgba(201,162,58,.15),transparent);border-radius:50%}
.sback{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;margin-bottom:10px;background:rgba(255,255,255,.1);border:none;padding:5px 11px;border-radius:20px;font-family:'DM Sans',sans-serif}
.sdname{font-family:'Playfair Display',serif;font-size:19px;color:#fff;font-weight:700;line-height:1.2}
.sdmeta{color:rgba(255,255,255,.6);font-size:10px;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.sdkpis{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:12px}
.sdkpi{background:rgba(255,255,255,.1);border-radius:9px;padding:8px 6px 6px;text-align:center;border:1px solid rgba(255,255,255,.12)}
.sdkv{color:var(--goldl);font-size:12px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.1}
.sdkl{color:rgba(255,255,255,.5);font-size:8px;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.sdkt{font-size:9px;margin-top:2px}
.sdkt.pos{color:#7effa0}.sdkt.neg{color:#ffaaaa}

/* DETAIL BODY */
.dbody{padding:10px 12px 24px}
.dsec{background:#fff;border-radius:var(--r);margin-bottom:9px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--br)}
.dshdr{background:linear-gradient(90deg,var(--gp),#fff);padding:7px 12px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:7px}
.dsico{font-size:12px;width:24px;height:24px;background:linear-gradient(135deg,var(--gold),var(--goldl));border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dstit{font-size:10px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.6px}
.drow{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid #f0f5f1}
.drow:last-child{border-bottom:none}
.dlbl{font-size:11px;color:var(--tl);flex:1}
.dval{font-size:11px;font-weight:600;color:var(--td);text-align:right;max-width:62%;word-break:break-word}
.dval.pos{color:#1b7a3a}.dval.neg{color:var(--rt)}.dval.gold{color:#9a7200}.dval.na{color:#aaa;font-weight:400;font-style:italic}

/* DUAL ROW */
.drowD{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid #f0f5f1}
.drowD:last-child{border-bottom:none}
.dDlbl{font-size:11px;color:var(--tl);flex:1}
.dDvals{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.dDtot{font-size:11px;font-weight:700;color:var(--td)}
.dDavg{font-size:9px;color:var(--tl)}

/* CALL BUTTON */
.cbtn{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--gm),var(--gl));color:#fff;text-decoration:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}

/* DEPT PILLS */
.dpills{padding:7px 12px;display:flex;flex-wrap:wrap;gap:5px}
.dpill{background:var(--gp);color:var(--gm);font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid #b8dfc0}

/* COMPETITION CHIPS */
.cchips{padding:6px 12px 8px;display:flex;flex-wrap:wrap;gap:5px}
.cchip{background:var(--goldp);color:#7a5c00;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid #e8d090}
.cchip.g{background:var(--gp);color:var(--gm);border-color:#b8dfc0}

/* INFRA GRID */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--br)}
.icell{background:#fff;padding:9px 4px;text-align:center}
.icv{font-size:15px;font-weight:700;color:var(--gd);font-family:'Playfair Display',serif}
.icl{font-size:8px;color:var(--tl);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;line-height:1.3}

/* MIX BARS */
.mrow{padding:7px 12px;border-bottom:1px solid #f0f5f1}
.mrow:last-child{border-bottom:none}
.mtop{display:flex;justify-content:space-between;margin-bottom:3px}
.mname{font-size:10px;color:var(--tm)}
.mpct{font-size:10px;font-weight:600;color:var(--gd)}
.mtrack{height:5px;background:var(--gp);border-radius:3px;overflow:hidden}
.mfill{height:100%;border-radius:3px}

/* INTENSITY CHART */
.irow{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid #f0f5f1;cursor:pointer}
.irow:last-child{border-bottom:none}
.irow-n{font-size:10px;font-weight:600;color:var(--gd);width:100px;flex-shrink:0}
.irow-bw{flex:1;margin:0 7px}
.irow-b{height:7px;background:var(--br);border-radius:3px;overflow:hidden}
.irow-f{height:100%;border-radius:3px}
.irow-v{font-size:10px;font-weight:700;color:var(--gd);width:65px;text-align:right;flex-shrink:0}

/* AREA DETAIL HEADER */
.adh{background:linear-gradient(135deg,#0a2e12 0%,var(--gd) 50%,#1a5e2a 100%);padding:12px 14px 16px;position:relative;overflow:hidden}
.adh::before{content:'';position:absolute;top:-20px;right:-20px;width:110px;height:110px;background:radial-gradient(circle,rgba(201,162,58,.15),transparent);border-radius:50%}

/* MANAGER STRIP */
.mgrs{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #f0f5f1}
.mgrs:last-child{border-bottom:none}
.mgrs-s{font-size:11px;font-weight:600;color:var(--gd)}
.mgrs-n{font-size:9px;color:var(--tl);margin-top:1px}

/* LIST CARD */
.lcard{background:#fff;border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--br)}
.bsafe{height:max(env(safe-area-inset-bottom,0px),16px)}

/* MONTH CHANGE NOTICE */
.mnotice{background:linear-gradient(135deg,rgba(201,162,58,.12),rgba(201,162,58,.05));border:1px solid rgba(201,162,58,.3);border-radius:var(--rs2);padding:8px 12px;margin-bottom:10px;font-size:10px;color:#7a5c00;text-align:center}
</style>
</head>

<div class="hdr">

  </div>
  <!-- MONTH SELECTOR -->
  <div class="month-bar">
    <button class="mbtn" onclick="setMonth('feb')">📅 February</button>
    <button class="mbtn" onclick="setMonth('mar')">📅 March</button>

  <!-- NAV TABS -->

</div>

<div class="view active" id="view-area">

  <button class="adbtn" onclick="openAreaDetail()">

  <div class="kstrip" id="areaKpis"></div>
  <div class="stitle">All 10 Stores · Tap for full details</div>

</div>

<div class="view" id="view-sales">

  <div id="salesRanking"></div>

</div>

<div class="view" id="view-kpi">

  <div id="kpiTable"></div>
  <div class="bsafe"></div>
</div>

<div class="view" id="view-contacts">
  <div class="stitle" style="margin-top:4px">Store Manager Contacts</div>
  <div id="contactsList"></div>
  <div class="bsafe"></div>
</div>

<div class="view" id="view-store"></div>
<div class="view" id="view-areadetail"></div>

// ── Helpers ───────────────────────────────────────────────
const f=(n,d=0)=>n==null?'—':n.toLocaleString('en-QA',{minimumFractionDigits:d,maximumFractionDigits:d});
const tc=v=>v==null?'':v>=0?'pos':'neg';
const ti=v=>v==null?'':v>=0?'▲':'▼';
const naV=(v,s)=>v!=null?`<span class="dval">${s}</span>`:'<span class="dval na">N/A</span>';

// ── Get active dataset ────────────────────────────────────
function getStores(){
  if(CUR==='ytd'){
    // YTD: use April figures for vs LY (already cumulative YTD)
    // For daily sales/basket/avail/wastage: simple avg of 3 months
    return SINFO.map((si,i)=>{
      const fd=MONTHS.feb.stores[i], md=MONTHS.mar.stores[i], ad=MONTHS.apr.stores[i];
      const avg3=(a,b,c)=>(a+b+c)/3;
      const avg3n=(a,b,c)=>{
        const vals=[a,b,c].filter(v=>v!=null);
        return vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:null;
      };
      return {
        ...si,
        sales:avg3(fd.sales,md.sales,ad.sales),
        salesLY:ad.salesLY, // use April YTD vs LY
        cc:avg3(fd.cc,md.cc,ad.cc),
        ccLY:ad.ccLY,
        basket:avg3(fd.basket,md.basket,ad.basket),
        basketLY:ad.basketLY,
        intensity:avg3(fd.intensity,md.intensity,ad.intensity),
        agg:avg3n(fd.agg,md.agg,ad.agg),
        ecom:avg3n(fd.ecom,md.ecom,ad.ecom),
        sco_pct:avg3n(fd.sco_pct,md.sco_pct,ad.sco_pct),
        avail:avg3(fd.avail,md.avail,ad.avail),
        wnf:avg3(fd.wnf,md.wnf,ad.wnf),
        wf:avg3(fd.wf,md.wf,ad.wf),
        fmcg:avg3(fd.fmcg,md.fmcg,ad.fmcg),
        fresh:avg3(fd.fresh,md.fresh,ad.fresh),
        nonfood:avg3(fd.nonfood,md.nonfood,ad.nonfood),
        tam:avg3(fd.tam,md.tam,ad.tam),
        staff:ad.staff, skus:ad.skus,
        totalShops:ad.totalShops,occShops:ad.occShops,
        totalKiosks:ad.totalKiosks,occKiosks:ad.occKiosks,
        _isYTD:true
      };
    });
  }
  return MONTHS[CUR].stores.map((s,i)=>({...SINFO[i],...s}));
}

function getLabel(){
  if(CUR==='ytd') return 'Feb – Apr 2025 Average';
  return MONTHS[CUR].label;
}
function getShort(){
  if(CUR==='ytd') return 'YTD';
  return MONTHS[CUR].short;
}
function getNote(){
  if(CUR==='ytd') return '⚠️ YTD: Daily sales/basket/availability = avg of 3 months. vs LY % = April YTD position.';
  return MONTHS[CUR].note;
}

function mlabelHTML(){
  return `<div class="mlabel">📅 ${getLabel()}</div>
  <div class="mnotice">${getNote()}</div>`;
}

// ── Set month ─────────────────────────────────────────────
function setMonth(m){
  CUR=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  const map={feb:0,mar:1,apr:2,ytd:3};
  document.querySelectorAll('.mbtn')[map[m]].classList.add('active');
  document.getElementById('activeBadge').textContent=getShort();
  buildAll();
}

function buildArea(){
  const S=getStores();
  const totalSales=S.reduce((a,s)=>a+s.sales,0);
  const totalCC=S.reduce((a,s)=>a+s.cc,0);
  const totalStaff=S.reduce((a,s)=>a+s.staff,0);
  const totalSize=S.reduce((a,s)=>a+s.size,0);
  const bestGrowth=[...S].sort((a,b)=>b.salesLY-a.salesLY)[0];
  const worstGrowth=[...S].sort((a,b)=>a.salesLY-b.salesLY)[0];

  document.getElementById('areaMonthLabel').innerHTML=mlabelHTML();

  document.getElementById('areaKpis').innerHTML=`
    <div class="kcard wide"><div class="kico">💰</div><div><div class="klbl">Area Total Daily Sales</div><div class="kval">QAR ${f(totalSales,0)}</div><div class="ksub">Across all 10 stores</div></div></div>
    <div class="kcard"><div class="klbl">Total Daily Txns</div><div class="kval">${f(totalCC,0)}</div><div class="ksub">All stores combined</div></div>

    <div class="kcard"><div class="klbl">Best Growth</div><div class="kval" style="font-size:13px;color:var(--gm)">${bestGrowth.name}</div><div class="ksub">${ti(bestGrowth.salesLY)}${Math.abs(bestGrowth.salesLY).toFixed(2)}% vs LY</div></div>
    <div class="kcard"><div class="klbl">Needs Attention</div><div class="kval" style="font-size:13px;color:var(--rt)">${worstGrowth.name}</div><div class="ksub">${ti(worstGrowth.salesLY)}${Math.abs(worstGrowth.salesLY).toFixed(2)}% vs LY</div></div>`;

  const sorted=[...S].sort((a,b)=>b.sales-a.sales);
  document.getElementById('storeList').innerHTML=S.map((s,i)=>{
    const rank=sorted.findIndex(x=>x.name===s.name)+1;
    return `<div class="scard" onclick="openStore(${i})">
      <div class="schdr">
        <div><div class="scname">${s.name}</div><div class="scsub">${s.type} · ${s.size.toLocaleString()} sqm · ${s.staff} staff</div></div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">🎯</div><div class="dstit">Area KPIs · ${getShort()}</div></div>
      <div class="drowD"><span class="dDlbl">FMCG Availability %</span><div class="dDvals"><span class="dDtot" style="color:${wAvgAvail>=85?'#1b7a3a':wAvgAvail>=80?'#9a7200':'#c0392b'}">Wtd: ${wAvgAvail.toFixed(2)}%</span><span class="dDavg">Simple avg: ${avgAvail.toFixed(2)}%</span></div></div>
      <div class="drowD"><span class="dDlbl">Wastage % (Non-Fresh)</span><div class="dDvals"><span class="dDtot" style="color:${avgWnf>-0.25?'#1b7a3a':'#c0392b'}">${avgWnf.toFixed(2)}%</span><span class="dDavg">Simple avg across 10 stores</span></div></div>
      <div class="drowD"><span class="dDlbl">Wastage % (Fresh)</span><div class="dDvals"><span class="dDtot" style="color:${avgWf>-4?'#1b7a3a':'#c0392b'}">${avgWf.toFixed(2)}%</span><span class="dDavg">Simple avg across 10 stores</span></div></div>
    </div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">🥧</div><div class="dstit">Category Mix — Weighted by Sales · ${getShort()}</div></div>
      ${mixW.map(m=>`<div class="mrow"><div class="mtop"><span class="mname">${m.l}</span><span class="mpct">${m.p.toFixed(2)}%</span></div><div class="mtrack"><div class="mfill" style="width:${m.p}%;background:${m.c}"></div></div></div>`).join('')}
    </div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">🥧</div><div class="dstit">Category Mix — Simple Average · ${getShort()}</div></div>
      ${mixS.map(m=>`<div class="mrow"><div class="mtop"><span class="mname">${m.l}</span><span class="mpct">${m.p.toFixed(2)}%</span></div><div class="mtrack"><div class="mfill" style="width:${m.p}%;background:${m.c}"></div></div></div>`).join('')}
    </div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">📈</div><div class="dstit">Sales Intensity / sqm · Ranked · ${getShort()}</div></div>
      ${byIntensity.map((s,i)=>{
        const idx=S.findIndex(x=>x.name===s.name);
        const w=(s.intensity/maxInt*100).toFixed(1);
        const col=i<3?'#c9a23a':i<5?'#2e9e4f':'#1b6b30';
        return `<div class="irow" onclick="openStore(${idx})">
          <div class="irow-n">${s.name}</div>
          <div class="irow-bw"><div class="irow-b"><div class="irow-f" style="width:${w}%;background:${col}"></div></div></div>
          <div class="irow-v">QAR ${f(s.intensity,0)}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">🏗</div><div class="dstit">Infrastructure Totals · ${getShort()}</div></div>
      <div class="igrid">
        <div class="icell"><div class="icv">${totalSize.toLocaleString()}</div><div class="icl">Total Selling sqm</div></div>
        <div class="icell"><div class="icv">${Math.round(totalSize/n).toLocaleString()}</div><div class="icl">Avg Store sqm</div></div>
        <div class="icell"><div class="icv">${totalBack.toLocaleString()}</div><div class="icl">Total Back sqm</div></div>
        <div class="icell"><div class="icv">${skuMin.toLocaleString()}</div><div class="icl">Min SKUs</div></div>
        <div class="icell"><div class="icv">${skuMax.toLocaleString()}</div><div class="icl">Max SKUs</div></div>
        <div class="icell"><div class="icv">${S.reduce((a,s)=>a+s.skus,0).toLocaleString()}</div><div class="icl">SKUs Combined</div></div>
        <div class="icell"><div class="icv">${totalCO}</div><div class="icl">Total Checkouts</div></div>
        <div class="icell"><div class="icv">${totalSCO}</div><div class="icl">Total Self-CO</div></div>
        <div class="icell"><div class="icv">${totalParks}</div><div class="icl">Car Parks</div></div>
        <div class="icell"><div class="icv">${totalTrolleys}</div><div class="icl">Trolleys</div></div>
        <div class="icell"><div class="icv">${totalBaskets}</div><div class="icl">Baskets</div></div>
        <div class="icell"><div class="icv">${totalStaff}</div><div class="icl">Total Staff</div></div>
        <div class="icell"><div class="icv">${totalChillers}</div><div class="icl">Chillers</div></div>
        <div class="icell"><div class="icv">${totalFreezers}</div><div class="icl">Freezers</div></div>
        <div class="icell"><div class="icv">${totalShops}/${occShops}</div><div class="icl">Shops T/O</div></div>
        <div class="icell"><div class="icv">${totalKiosks}/${occKiosks}</div><div class="icl">Kiosks T/O</div></div>
        <div class="icell"><div class="icv">${(totalStaff/totalSize*1000).toFixed(1)}</div><div class="icl">Staff/1K sqm</div></div>
        <div class="icell"><div class="icv">${Math.round(totalSales/totalStaff).toLocaleString()}</div><div class="icl">Sales/Staff QAR</div></div>
      </div>
    </div>

    <div class="dsec">
      <div class="dshdr"><div class="dsico">📞</div><div class="dstit">All Store Managers</div></div>
      ${SINFO.map((s,i)=>`<div class="mgrs">
        <div style="cursor:pointer" onclick="openStore(${i})"><div class="mgrs-s">${s.name}</div><div class="mgrs-n">${s.manager}</div></div>
        <a href="tel:${s.phone}" class="cbtn">📞 ${s.phone}</a>
      </div>`).join('')}
    </div>
  </div>
  <div class="bsafe"></div>`;

  sv('areadetail',false);
  window.scrollTo(0,0);
  v.scrollTop=0;
}

function closeAreaDetail(){ sv('area'); }

// ── View switcher ─────────────────────────────────────────
function sv(name,updateTabs=true){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(updateTabs){
    document.querySelectorAll('.navtab').forEach(t=>t.classList.remove('active'));
    const m={area:0,sales:1,kpi:2,contacts:3};
    if(m[name]!==undefined) document.querySelectorAll('.navtab')[m[name]].classList.add('active');
  }
  const hide=name==='store'||name==='areadetail';
  document.getElementById('navTabs').style.display=hide?'none':'flex';
}

// ── Init ──────────────────────────────────────────────────
buildAll();
</script>
</body>
</html>
